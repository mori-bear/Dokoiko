<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="出発地・距離感・テーマ・難易度・滞在タイプから旅行プランをランダム提案。迷ったらまかせて。">
  <meta name="theme-color" content="#2563eb">
  <title>どこ行こ？ - 日帰り旅プラン提案</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">

    <header class="app-header">
      <h1 class="app-title">どこ行こ？</h1>
      <p class="app-subtitle">迷ったら、まかせて。<br>日帰り旅プランをランダム提案。</p>
    </header>

    <main class="app-main">
      <div class="form-card">
        <div class="form-group">
          <label for="departure">出発地</label>
          <div class="select-wrap">
            <select id="departure">
              <option value="">読み込み中...</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group form-group--half">
            <label for="distance">距離感</label>
            <div class="select-wrap">
              <select id="distance">
                <option value="any">こだわらない</option>
                <option value="near">近場</option>
                <option value="far">遠出</option>
              </select>
            </div>
          </div>

          <div class="form-group form-group--half">
            <label for="theme">テーマ</label>
            <div class="select-wrap">
              <select id="theme">
                <option value="any">こだわらない</option>
                <option value="view">景色</option>
                <option value="food">グルメ</option>
                <option value="experience">体験</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group form-group--half">
            <label for="difficulty">難易度</label>
            <div class="select-wrap">
              <select id="difficulty">
                <option value="any">こだわらない</option>
                <option value="easy">かんたん（★1〜2）</option>
                <option value="normal">ふつう（★3）</option>
                <option value="hard">上級者向け（★4〜5）</option>
              </select>
            </div>
          </div>

          <div class="form-group form-group--half">
            <label for="stay">滞在タイプ</label>
            <div class="select-wrap">
              <select id="stay">
                <option value="any">こだわらない</option>
                <option value="daytrip">日帰り</option>
                <option value="1night">1泊2日</option>
                <option value="2night">2泊3日</option>
              </select>
            </div>
          </div>
        </div>

        <button id="generate-btn" class="primary-btn" disabled>
          読み込み中...
        </button>
      </div>

      <div id="result" class="result-container" style="display:none;"></div>
    </main>

    <footer class="app-footer">
      <p>掲載情報は変更の可能性があります。お出かけ前に最新情報をご確認ください。</p>
    </footer>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
