<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="出発地・距離感・テーマ・滞在タイプから旅行プランをランダム提案。迷ったらまかせて。">
  <meta name="theme-color" content="#2563eb">
  <title>どこ行こ？ - 旅プラン提案</title>
  <link rel="stylesheet" href="./css/style.css?v=999">
</head>

<body>
  <div class="app">

    <!-- ===== Header ===== -->
    <header class="app-header">
      <h1 class="app-title">どこ行こ？</h1>
      <p class="app-subtitle">
        迷ったら、まかせて。<br>
        旅プランをランダム提案。
      </p>
    </header>

    <!-- ===== Main ===== -->
    <main class="app-main">

      <div class="form-card">

        <!-- 出発地 -->
        <div class="form-group">
          <label for="departure">出発地</label>
          <div class="select-wrap">
            <select id="departure">
              <option value="">読み込み中...</option>
            </select>
          </div>
        </div>

        <!-- 出発日 -->
        <div class="form-group">
          <label for="dep-date">出発日</label>
          <input type="date" id="dep-date" class="form-input">
        </div>

        <!-- 出発時間 -->
        <div class="form-group">
          <label for="dep-time">出発時間</label>
          <input type="time" id="dep-time" class="form-input">
        </div>

        <!-- 距離・テーマ -->
        <div class="form-row">
          <div class="form-group form-group--half">
            <label for="distance">距離感</label>
            <div class="select-wrap">
              <select id="distance">
                <option value="any">こだわらない</option>
                <option value="near">近場</option>
                <option value="far">遠出</option>
              </select>
            </div>
          </div>

          <div class="form-group form-group--half">
            <label for="theme">テーマ</label>
            <div class="select-wrap">
              <select id="theme">
                <option value="any">こだわらない</option>
                <option value="view">景色</option>
                <option value="food">グルメ</option>
                <option value="experience">体験</option>
              </select>
            </div>
          </div>
        </div>

        <!-- 滞在タイプ -->
        <div class="form-group">
          <label for="stay">滞在タイプ</label>
          <div class="select-wrap">
            <select id="stay">
              <option value="any">こだわらない</option>
              <option value="daytrip">日帰り</option>
              <option value="1night">1泊2日</option>
              <option value="2night">2泊3日</option>
            </select>
          </div>
        </div>

        <!-- ボタン -->
        <button id="generate-btn" class="primary-btn" disabled>
          読み込み中...
        </button>

      </div>

      <!-- 結果 -->
      <div id="result" class="result-container" style="display:none;"></div>

    </main>

    <!-- ===== Footer ===== -->
    <footer class="app-footer">
      <p>
        掲載情報は変更の可能性があります。<br>
        お出かけ前に最新情報をご確認ください。
      </p>

      <p style="margin-top:12px;">
        <a href="terms.html">利用規約</a> |
        <a href="privacy.html">プライバシーポリシー</a>
      </p>
    </footer>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
